<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- START SCREEN -->
    <div id="start-screen" class="container">
      <h1>YellowBird Run</h1>
      <div id="startText">
        <p>Start the car to begin the game, use the key, and remember, in a Porsche, the key is on the left side.</p>
        <p>Avoid the oncoming vehicles by using the arrow keys.</p>
      </div>

      <div id="music-player">
        <button id="music-prev" class="music-btn">&#9664;</button>
        <span id="music-title">─</span>
        <button id="music-next" class="music-btn">&#9654;</button>
        <button id="music-play" class="music-btn music-play-btn">&#9654;</button>
      </div>

      <img id="salpicadero" src="/img/menu /salpicadero.png" />
      <img id="start-btn" src="img/menu /start.png" />
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="container">
      <div id="game-box">
          <div id="damage-overlay"></div>
          <div id="score-display">0</div>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="container">
      <h1 id="gameoverh1">GAME OVER</h1>
      <button id="newRunButton">NEW RUN</button>
    </div>

    <script src="/js/sounds.js"></script>
    <script src="/js/enemies.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/yellowBird.js"></script>

    <script>
      document.getElementById("music-prev").addEventListener("click", () => MusicPlayer.selectPrev());
      document.getElementById("music-next").addEventListener("click", () => MusicPlayer.selectNext());
      document.getElementById("music-play").addEventListener("click", () => MusicPlayer.togglePreview());
    </script>
  </body>
</html>
